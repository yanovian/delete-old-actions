name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Action version
      description: The tag you're using, e.g. `v1` or `v1.0.11`
      placeholder: v1
    validations:
      required: true

  - type: textarea
    id: inputs
    attributes:
      label: Workflow inputs
      description: The `with:` block you used (token can be redacted)
      render: yaml
      placeholder: |
        days-ago: 30
        dry-run: true
        keep-latest: 5
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
